<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投票历史 - 可撤销匿名凭证系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg:#0a0e1a; --bg2:#111827; --card:#1a1f35; --border:#2a3050; --text:#f0f4ff; --text2:#8892b0; --text3:#4a5578; --a1:#6366f1; --a2:#8b5cf6; --a3:#a78bfa; --ok:#10b981; --err:#ef4444; --warn:#f59e0b; --r:16px; --rs:10px; --rx:6px; }
        html[data-theme="light"]{--bg:#f0f2f5;--bg2:#ffffff;--card:#ffffff;--border:#dce1e8;--text:#1e2330;--text2:#64748b;--text3:#94a3b8;--a1:#6366f1;--a2:#8b5cf6;--a3:#a78bfa;--ok:#10b981;--err:#ef4444;--warn:#f59e0b;}
        html[data-theme="light"] .bg-grid{background-image:linear-gradient(rgba(99,102,241,0.06)1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.06)1px,transparent 1px)}
        html[data-theme="light"] .glow{opacity:.4}
        .theme-btn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:var(--card);border:1px solid var(--border);border-radius:var(--rx);cursor:pointer;font-size:16px;transition:.3s;font-family:inherit;line-height:1;padding:0;flex-shrink:0}
        .theme-btn:hover{border-color:var(--a1);transform:translateY(-1px)}
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.6; }
        .bg-grid { position:fixed; inset:0; background-image:linear-gradient(rgba(99,102,241,0.03)1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.03)1px,transparent 1px); background-size:60px 60px; pointer-events:none; z-index:0; }
        .glow { position:fixed; top:-20%; right:-10%; width:500px; height:500px; background:radial-gradient(circle,rgba(99,102,241,0.08) 0%,transparent 70%); border-radius:50%; pointer-events:none; z-index:0; animation:f 8s ease-in-out infinite; }
        @keyframes f { 0%,100%{transform:translate(0,0)scale(1)} 50%{transform:translate(30px,-30px)scale(1.05)} }
        .container { position:relative; z-index:1; max-width:860px; margin:0 auto; padding:24px; }
        .header { display:flex; justify-content:space-between; align-items:center; padding:20px 0; margin-bottom:24px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:10px; }
        .header h1 { font-size:22px; font-weight:700; background:linear-gradient(135deg,var(--text),var(--a2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .header-right { display:flex; align-items:center; gap:10px; }
        .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 20px; border-radius:var(--rx); font-size:13px; font-weight:600; cursor:pointer; border:none; transition:.3s; font-family:inherit; text-decoration:none; }
        .btn-primary { background:linear-gradient(135deg,var(--a1),var(--a2)); color:white; }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(99,102,241,0.4); }
        .btn-outline { background:transparent; color:var(--text2); border:1px solid var(--border); }
        .btn-outline:hover { border-color:var(--a1); color:var(--text); }
        .btn-sm { padding:6px 14px; font-size:12px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:24px; margin-bottom:16px; }
        .search-box { display:flex; gap:10px; margin-bottom:16px; }
        .search-box input { flex:1; background:var(--bg2); border:1px solid var(--border); border-radius:var(--rx); padding:10px 14px; color:var(--text); font-size:13px; font-family:inherit; outline:none; transition:.3s; }
        .search-box input:focus { border-color:var(--a1); box-shadow:0 0 0 3px rgba(99,102,241,0.15); }
        .contract-item { background:var(--bg2); border:1px solid var(--border); border-radius:var(--rs); padding:16px; margin-bottom:10px; cursor:pointer; transition:.3s; }
        .contract-item:hover { border-color:var(--a1); transform:translateX(4px); }
        .contract-item p { font-size:13px; color:var(--text2); margin:3px 0; }
        .contract-item p strong { color:var(--text); font-weight:500; }
        .badge { display:inline-block; padding:2px 10px; border-radius:10px; font-size:11px; font-weight:600; }
        .badge-ok { background:rgba(16,185,129,0.1); color:var(--ok); }
        .badge-warn { background:rgba(245,158,11,0.1); color:var(--warn); }
        .badge-err { background:rgba(239,68,68,0.1); color:var(--err); }
        .nav-bar { display:flex; align-items:center; gap:6px; padding:8px 0; margin-bottom:12px; flex-wrap:wrap; }
        .nav-bar a { display:inline-flex; align-items:center; gap:4px; padding:5px 12px; border-radius:var(--rx); font-size:12px; font-weight:500; color:var(--text2); text-decoration:none; transition:.3s; background:var(--bg2); border:1px solid var(--border); }
        .nav-bar a:hover { color:var(--text); border-color:var(--a1); }
        .nav-bar .nav-back { margin-left:auto; }
        .pagination { display:flex; justify-content:center; gap:6px; margin-top:20px; flex-wrap:wrap; }
        .pagination button { background:var(--bg2); color:var(--text2); border:1px solid var(--border); padding:8px 14px; border-radius:var(--rx); cursor:pointer; font-size:12px; font-family:inherit; transition:.3s; }
        .pagination button:hover { border-color:var(--a1); color:var(--text); }
        .pagination button.active { background:linear-gradient(135deg,var(--a1),var(--a2)); color:white; border-color:transparent; }
        .modal { display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); padding-top:60px; }
        .modal-content { background:var(--card); border:1px solid var(--border); border-radius:var(--r); margin:5% auto; padding:24px; width:90%; max-width:600px; position:relative; }
        .modal-close { position:absolute; top:12px; right:16px; font-size:24px; color:var(--text2); cursor:pointer; transition:.3s; background:none; border:none; font-family:inherit; }
        .modal-close:hover { color:var(--text); }
        .empty { text-align:center; padding:40px; color:var(--text2); font-size:14px; }
        .empty .icon { font-size:48px; margin-bottom:12px; }
    </style>
</head>
<body>
<div class="bg-grid"></div><div class="glow"></div>
<div class="container">
    <div class="nav-bar">
        <a href="index.html">首页</a>
        <a href="dashboard.html">用户中心</a>
        <a href="javascript:history.back()" class="nav-back">返回</a>
    </div>
    <div class="header">
        <h1>📜 投票历史</h1>
        <div class="header-right">
            <button class="theme-btn" onclick="toggleTheme()" title="切换主题"></button>
        </div>
    </div>

    <div class="card">
        <div class="search-box">
            <input id="searchInput" placeholder="🔍 搜索合约地址或投票名称..." onkeypress="if(event.key==='Enter')searchContracts()">
            <button class="btn btn-primary" onclick="searchContracts()">搜索</button>
        </div>
        <div id="contractsList"></div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <canvas id="modalChart"></canvas>
    </div>
</div>

<script>
(function(){const t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');updateThemeIcon()})();
function toggleTheme(){const h=document.documentElement;const l=h.getAttribute('data-theme')==='light';l?(h.removeAttribute('data-theme'),localStorage.setItem('theme','dark')):(h.setAttribute('data-theme','light'),localStorage.setItem('theme','light'));updateThemeIcon()}
function updateThemeIcon(){document.querySelectorAll('.theme-btn').forEach(b=>{b.textContent=document.documentElement.getAttribute('data-theme')==='light'?'🌙':'☀️'})}
    let currentChart = null;
    let currentPage = 1;
    const perPage = 5;
    let contractsData = null;

    async function getMetaMaskAccount() {
        if (window.ethereum) {
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            return accounts[0];
        }
        return null;
    }

    async function fetchContracts() {
        const pk = await getMetaMaskAccount();
        if (!pk) return { contracts: [] };
        const r = await fetch('/getHistoryContracts', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({publicKey:pk}) });
        return r.json();
    }

    async function loadContracts() { contractsData = await fetchContracts(); displayPage(currentPage); }
    window.addEventListener('load', loadContracts);

    function displayPage(page) {
        const list = document.getElementById('contractsList');
        const pag = document.getElementById('pagination');
        list.innerHTML = ''; pag.innerHTML = '';
        if (!contractsData || !contractsData.contracts || contractsData.contracts.length === 0) {
            list.innerHTML = '<div class="empty"><div class="icon">📭</div><p>暂无投票记录</p><p style="margin-top:8px;color:var(--text3)">去 <a href="/join-vote.html" style="color:var(--a1)">加入投票</a> 参与吧</p></div>';
            return;
        }
        const start = (page - 1) * perPage;
        const end = Math.min(start + perPage, contractsData.contracts.length);
        for (let i = start; i < end; i++) {
            const c = contractsData.contracts[i];
            const el = document.createElement('div'); el.className = 'contract-item';
            const status = Date.now() >= new Date(c.deadline).getTime() ? '已截止' : '投票中';
            const badgeCls = status === '投票中' ? 'badge-ok' : 'badge-err';
            el.innerHTML = `
                <p><strong>${c.vote_title}</strong> <span class="badge ${badgeCls}">${status}</span></p>
                <p>📅 ${c.deadline} ｜ 🎯 选择: <strong style="color:var(--a3)">${c.user_choice}</strong></p>
                <p style="font-size:11px;color:var(--text3);word-break:break-all">📍 ${c.contract_address}</p>
            `;
            el.addEventListener('click', () => viewDetails(c.contract_address));
            list.appendChild(el);
        }
        if (contractsData.contracts.length > perPage) renderPagination(contractsData.contracts.length, page);
    }

    function renderPagination(total, page) {
        const totalPages = Math.ceil(total / perPage);
        const pag = document.getElementById('pagination');
        let s = Math.max(1, page - 2), e = Math.min(totalPages, page + 2);
        if (s > 1) { const b = document.createElement('button'); b.textContent = '1'; b.onclick = () => goPage(1); pag.appendChild(b); if (s > 2) { const d = document.createElement('button'); d.textContent = '...'; d.disabled = true; pag.appendChild(d); } }
        for (let i = s; i <= e; i++) { const b = document.createElement('button'); b.textContent = i; b.className = i === page ? 'active' : ''; b.onclick = () => goPage(i); pag.appendChild(b); }
        if (e < totalPages) { if (e < totalPages - 1) { const d = document.createElement('button'); d.textContent = '...'; d.disabled = true; pag.appendChild(d); } const b = document.createElement('button'); b.textContent = totalPages; b.onclick = () => goPage(totalPages); pag.appendChild(b); }
    }

    function goPage(p) { currentPage = p; displayPage(p); }

    async function viewDetails(addr) {
        if (currentChart) currentChart.destroy();
        try {
            const r = await fetch('/getContractDetails', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({contractAddress:addr}) });
            const data = await r.json();
            document.getElementById('myModal').style.display = 'block';
            const ctx = document.getElementById('modalChart').getContext('2d');
            currentChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.options,
                    datasets: [{
                        label: '得票数',
                        data: data.voteCounts,
                        backgroundColor: 'rgba(99,102,241,0.5)',
                        borderColor: 'rgba(99,102,241,1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#8892b0' } } },
                    scales: {
                        x: { ticks: { color: '#8892b0' }, grid: { color: 'rgba(42,48,80,0.3)' } },
                        y: { beginAtZero: true, ticks: { color: '#8892b0', stepSize: 1 }, grid: { color: 'rgba(42,48,80,0.3)' } }
                    }
                }
            });
        } catch(e) { alert('加载失败: ' + e.message); }
    }

    function closeModal() { document.getElementById('myModal').style.display = 'none'; }
    window.onclick = function(e) { const m = document.getElementById('myModal'); if (e.target === m) m.style.display = 'none'; };

    async function searchContracts() {
        const kw = document.getElementById('searchInput').value.trim();
        if (!kw) { contractsData = await fetchContracts(); displayPage(currentPage); return; }
        const pk = await getMetaMaskAccount();
        const r = await fetch('/searchHistoryContracts', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({keyword:kw, userPublicKey:pk}) });
        const d = await r.json();
        if (d && d.contracts && d.contracts.length === 0) { alert('没有相关记录'); return; }
        contractsData = d; displayPage(currentPage);
    }
</script>
</body>
</html>
