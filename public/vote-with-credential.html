<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名投票 - 可撤销匿名凭证系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a; --bg2: #111827; --card: #1a1f35; --border: #2a3050;
            --text: #f0f4ff; --text2: #8892b0; --text3: #4a5578;
            --a1: #6366f1; --a2: #8b5cf6; --a3: #a78bfa;
            --ok: #10b981; --okbg: rgba(16,185,129,0.1);
            --err: #ef4444; --errbg: rgba(239,68,68,0.1);
            --warn: #f59e0b; --warnbg: rgba(245,158,11,0.1);
            --info: #3b82f6; --infobg: rgba(59,130,246,0.1);
            --r: 16px; --rs: 10px; --rx: 6px;
        }
        html[data-theme="light"]{--bg:#f0f2f5;--bg2:#ffffff;--card:#ffffff;--border:#dce1e8;--text:#1e2330;--text2:#64748b;--text3:#94a3b8;--a1:#6366f1;--a2:#8b5cf6;--a3:#a78bfa;--ok:#10b981;--okbg:rgba(16,185,129,0.1);--err:#ef4444;--errbg:rgba(239,68,68,0.1);--warn:#f59e0b;--warnbg:rgba(245,158,11,0.1);--info:#3b82f6;--infobg:rgba(59,130,246,0.1);--r:16px;--rs:10px;--rx:6px;}
        html[data-theme="light"] .bg-grid{background-image:linear-gradient(rgba(99,102,241,0.06)1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.06)1px,transparent 1px)}
        html[data-theme="light"] .glow{opacity:.4}
        .theme-btn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:var(--card);border:1px solid var(--border);border-radius:var(--rx);cursor:pointer;font-size:16px;transition:.3s;font-family:inherit;line-height:1;padding:0;flex-shrink:0}
        .theme-btn:hover{border-color:var(--a1);transform:translateY(-1px)}
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.6; }
        .bg-grid { position:fixed; inset:0; background-image:linear-gradient(rgba(99,102,241,0.03)1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.03)1px,transparent 1px); background-size:60px 60px; pointer-events:none; z-index:0; }
        .glow { position:fixed; top:-20%; right:-10%; width:500px; height:500px; background:radial-gradient(circle,rgba(99,102,241,0.08) 0%,transparent 70%); border-radius:50%; pointer-events:none; z-index:0; animation:f 8s ease-in-out infinite; }
        @keyframes f { 0%,100%{transform:translate(0,0)scale(1)} 50%{transform:translate(30px,-30px)scale(1.05)} }
        .container { position:relative; z-index:1; max-width:1000px; margin:0 auto; padding:24px; }
        .header { text-align:center; padding:30px 0 20px; }
        .header h1 { font-size:32px; font-weight:800; background:linear-gradient(135deg,var(--text),var(--a2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .header p { color:var(--text2); font-size:14px; margin-top:4px; }
        .steps { display:flex; justify-content:space-between; gap:6px; margin-bottom:24px; }
        .step { flex:1; padding:14px 8px; background:var(--card); border:1px solid var(--border); border-radius:var(--rs); text-align:center; font-size:12px; font-weight:500; color:var(--text3); transition:all .3s; cursor:pointer; }
        .step.active { border-color:var(--a1); color:var(--a3); background:rgba(99,102,241,0.05); }
        .step.done { border-color:var(--ok); color:var(--ok); background:var(--okbg); }
        .card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:28px; margin-bottom:16px; }
        .card h2 { font-size:18px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
        .card p { color:var(--text2); font-size:14px; margin-bottom:16px; }
        .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
        .row label { font-size:13px; color:var(--text2); font-weight:500; min-width:70px; }
        input,select { background:var(--bg2); border:1px solid var(--border); border-radius:var(--rx); padding:10px 14px; color:var(--text); font-size:13px; font-family:inherit; outline:none; flex:1; transition:.3s; }
        input:focus { border-color:var(--a1); box-shadow:0 0 0 3px rgba(99,102,241,0.15); }
        .btn { display:inline-flex; align-items:center; gap:8px; padding:10px 24px; border-radius:var(--rx); font-size:13px; font-weight:600; border:none; cursor:pointer; transition:.3s; font-family:inherit; white-space:nowrap; }
        .btn-primary { background:linear-gradient(135deg,var(--a1),var(--a2)); color:white; }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(99,102,241,0.4); }
        .btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }
        .btn-success { background:linear-gradient(135deg,var(--ok),#059669); color:white; }
        .btn-success:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(16,185,129,0.4); }
        .btn-danger { background:linear-gradient(135deg,var(--err),#dc2626); color:white; }
        .btn-lg { padding:12px 28px; font-size:14px; }
        .msg { display:none; align-items:center; gap:10px; padding:10px 14px; border-radius:var(--rx); font-size:13px; margin:8px 0; }
        .msg.show { display:flex; }
        .msg.ok { background:var(--okbg); color:var(--ok); border:1px solid rgba(16,185,129,0.2); }
        .msg.err { background:var(--errbg); color:var(--err); border:1px solid rgba(239,68,68,0.2); }
        .msg.info { background:var(--infobg); color:var(--info); border:1px solid rgba(59,130,246,0.2); }
        .data-box { background:var(--bg2); border-radius:var(--rs); padding:14px; margin-top:10px; border:1px solid var(--border); font-family:monospace; font-size:12px; line-height:1.8; }
        .dr { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid rgba(42,48,80,0.5); }
        .dr:last-child { border-bottom:none; }
        .dk { color:var(--text2); font-size:13px; }
        .dv { color:var(--text); font-size:13px; font-weight:500; max-width:60%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .badge { display:inline-block; padding:2px 10px; border-radius:10px; font-size:11px; font-weight:600; }
        .badge-info { background:var(--infobg); color:var(--info); }
        .badge-ok { background:var(--okbg); color:var(--ok); }
        .result-box { text-align:center; padding:30px; border-radius:var(--rs); }
        .result-box.ok { background:var(--okbg); border:1px solid rgba(16,185,129,0.2); }
        .result-box.err { background:var(--errbg); border:1px solid rgba(239,68,68,0.2); }
        .result-box .icon { font-size:48px; }
        .result-box .title { font-size:20px; font-weight:700; margin-top:8px; }
        .tabs { display:flex; gap:0; margin-bottom:16px; background:var(--bg2); border-radius:var(--rx); overflow:hidden; border:1px solid var(--border); }
        .tab { flex:1; padding:10px; text-align:center; font-size:13px; font-weight:500; color:var(--text3); cursor:pointer; transition:.3s; }
        .tab.active { background:var(--a1); color:white; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        .nav-bar { display:flex; align-items:center; gap:6px; padding:8px 0; margin-bottom:12px; flex-wrap:wrap; }
        .nav-bar a { display:inline-flex; align-items:center; gap:4px; padding:5px 12px; border-radius:var(--rx); font-size:12px; font-weight:500; color:var(--text2); text-decoration:none; transition:.3s; background:var(--bg2); border:1px solid var(--border); }
        .nav-bar a:hover { color:var(--text); border-color:var(--a1); }
        .nav-bar .nav-back { margin-left:auto; }
        @media(max-width:700px) { .steps { flex-wrap:wrap; } .step { min-width:calc(50% - 6px); } }
    </style>
</head>
<body>
<div class="bg-grid"></div><div class="glow"></div>

<div class="container">
    <div class="nav-bar">
        <a href="index.html">首页</a>
        <a href="dashboard.html">用户中心</a>
        <a href="javascript:history.back()" class="nav-back">返回</a>
    </div>
    <div class="header" style="position:relative">
        <div style="position:absolute;top:0;right:0"><button class="theme-btn" onclick="toggleTheme()" title="切换主题"></button></div>
        <h1>🎭 匿名投票</h1>
        <p>基于可撤销匿名凭证的隐私保护投票 · 验证者无法追踪投票者身份</p>
    </div>

    <!-- 用户绑定信息 -->
    <div id="userBanner" style="display:none;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:14px 20px;margin-bottom:16px;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:20px">🔐</span>
            <div>
                <div style="font-size:13px;font-weight:600;color:var(--text)"><span id="userDisplayName"></span></div>
                <div style="font-size:12px;color:var(--text2)">邮箱绑定: <span id="userDisplayEmail"></span></div>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
            <span class="badge badge-ok" id="emailBindBadge">✅ 已绑定邮箱</span>
            <a href="/login.html" style="color:var(--a1);font-size:12px;text-decoration:none">切换账号</a>
        </div>
    </div>

    <!-- Flow Steps -->
    <div class="steps" id="stepBar">
        <div class="step active" data-s="0">① 连接钱包</div>
        <div class="step" data-s="1">② 凭证系统</div>
        <div class="step" data-s="2">③ 获取凭证</div>
        <div class="step" data-s="3">④ 选择投票</div>
        <div class="step" data-s="4">⑤ 匿名令牌</div>
        <div class="step" data-s="5">⑥ 提交投票</div>
    </div>

    <!-- Step Container -->
    <div id="stepContent"></div>
</div>

<script>
(function(){const t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');updateThemeIcon()})();
function toggleTheme(){const h=document.documentElement;const l=h.getAttribute('data-theme')==='light';l?(h.removeAttribute('data-theme'),localStorage.setItem('theme','dark')):(h.setAttribute('data-theme','light'),localStorage.setItem('theme','light'));updateThemeIcon()}
function updateThemeIcon(){document.querySelectorAll('.theme-btn').forEach(b=>{b.textContent=document.documentElement.getAttribute('data-theme')==='light'?'🌙':'☀️'})}
    const API = '/api/credential';
    let currentStep = 0;
    let state = {
        initialized: false, pp: null, pk: null,
        userId: null, userEmail: null, userName: null, userKey: null, reg: null,
        partialCreds: [], cred: null,
        tok: null, tokHash: null, voteInfo: null,
        accounts: [], selectedAccount: null,
    };

    function $(id) { return document.getElementById(id); }

    function updateSteps() {
        document.querySelectorAll('.step').forEach((el, i) => {
            el.classList.toggle('active', i === currentStep);
            el.classList.toggle('done', i < currentStep);
        });
    }

    // 步骤条点击导航
    document.addEventListener('click', function(e) {
        const step = e.target.closest('.step');
        if (step) {
            const s = parseInt(step.dataset.s);
            if (!isNaN(s)) goToStep(s);
        }
    });

    function goToStep(n) { if (n >= 0 && n <= 5) { currentStep = n; updateSteps(); renderStep(); } }

    async function api(method, path, body) {
        const opts = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) opts.body = JSON.stringify(body);
        const r = await fetch(`${API}${path}`, opts);
        return r.json();
    }

    function show(el, msg, type) { if (!el) return; el.className = `msg show ${type}`; el.innerHTML = msg; }
    function hide(el) { if (el) el.className = 'msg'; }

    function renderStep() {
        const c = $('stepContent'); if (!c) return;
        const renderers = [step0, step1, step2, step3, step4, step5];
        c.innerHTML = '';
        if (renderers[currentStep]) renderers[currentStep](c);
    }

    // ─── Step 0: Connect Wallet ───
    function step0(c) {
        c.innerHTML = `
            <div class="card">
                <h2>🦊 连接钱包</h2>
                <p>连接 MetaMask 或使用 Ganache 账户地址开始匿名投票流程</p>
                <div class="row"><label>账户地址</label><input id="wAddr" placeholder="0x... 或点击连接" readonly></div>
                <div class="row">
                    <button class="btn btn-primary btn-lg" onclick="connectMetaMask()">🦊 连接 MetaMask</button>
                    <button class="btn btn-primary" onclick="useGanache()">⚡ 使用 Ganache</button>
                </div>
                <div class="msg" id="wMsg"></div>
            </div>
        `;
        if (state.selectedAccount) $(wAddr).value = state.selectedAccount;
    }

    async function connectMetaMask() {
        if (typeof window.ethereum === 'undefined') {
            show($('wMsg'), '请安装 MetaMask 插件', 'err'); return;
        }
        try {
            const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
            state.selectedAccount = accounts[0];
            $('wAddr').value = accounts[0];
            show($('wMsg'), `已连接: ${accounts[0].substring(0, 20)}...`, 'ok');
            setTimeout(() => goToStep(1), 800);
        } catch(e) { show($('wMsg'), '连接失败: ' + e.message, 'err'); }
    }

    async function useGanache() {
        try {
            const r = await fetch('/');
            // Just use a placeholder address for demo
            state.selectedAccount = '0xDemo_' + Date.now().toString(36);
            $('wAddr').value = state.selectedAccount;
            show($('wMsg'), '演示模式: ' + state.selectedAccount, 'ok');
            setTimeout(() => goToStep(1), 800);
        } catch(e) { show($('wMsg'), '失败: ' + e.message, 'err'); }
    }

    // ─── Step 1: Credential System Setup (auto-filled from session) ───
    function step1(c) {
        const uid = state.userEmail || state.userId || 'voter_' + Date.now().toString(36);
        c.innerHTML = `
            <div class="card">
                <h2>⚡ 凭证系统初始化</h2>
                <p>初始化可撤销匿名凭证系统的公共参数和密钥分发。用户邮箱作为身份标识，绑定匿名凭证</p>
                <div class="row">
                    <label>邮箱</label>
                    <input id="uid" value="${uid}" placeholder="输入身份标识" readonly style="color:var(--a3);opacity:0.8">
                </div>
                <div class="row">
                    <button class="btn btn-primary btn-lg" onclick="initSystem()">🚀 初始化系统</button>
                    ${state.initialized ? '<span style="color:var(--ok);font-size:13px">✅ 已初始化</span>' : ''}
                </div>
                <div class="msg" id="s1Msg"></div>
                ${state.initialized ? `
                <div class="data-box">
                    <div class="dr"><span class="dk">曲线</span><span class="dv">BLS12-381 (Type-III)</span></div>
                    <div class="dr"><span class="dk">发行者</span><span class="dv">5 (阈值 3)</span></div>
                    <div class="dr"><span class="dk">追踪者</span><span class="dv">3 (阈值 2)</span></div>
                </div>` : ''}
                <div class="msg show ok" style="margin-top:12px">
                    📧 用户身份: <strong>${uid}</strong>（使用邮箱作为凭证身份标识）
                </div>
            </div>
        `;
    }

    async function initSystem() {
        const msg = $('s1Msg'); hide(msg);
        state.userId = $('uid').value.trim() || 'voter_' + Date.now().toString(36);

        // 先检查系统是否已初始化
        const statusRes = await api('GET', '/status');
        if (statusRes.initialized) {
            state.initialized = true;
            show(msg, '系统已就绪，跳过初始化', 'ok');
            setTimeout(() => goToStep(2), 800);
            return;
        }

        const res = await api('POST', '/setup', { lambda: 128, n_I: 5, t_I: 3, n_T: 3, t_T: 2, q: 3 });
        if (res.success) {
            state.initialized = true;
            state.pp = res.result.pp;
            state.pk = res.result.pk;
            show(msg, '系统初始化成功！', 'ok');
            setTimeout(() => goToStep(2), 800);
        } else {
            show(msg, '初始化失败: ' + (res.message || ''), 'err');
        }
    }

    // ─── Step 2: Get Credential ───
    function step2(c) {
        c.innerHTML = `
            <div class="card">
                <h2>🔑 获取匿名凭证</h2>
                <p>生成密钥对 → 注册属性 → 发行者签发 → 聚合凭证。UKeyGen → Obtain → Issue → CredAgg</p>
                <div class="row"><label>属性</label>
                    <input id="a1" value="voter" style="flex:1">
                    <input id="a2" value="adult" style="flex:1">
                    <input id="a3" value="verified" style="flex:1">
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap">
                    <button class="btn btn-primary" onclick="doKeyGen()" ${!state.initialized?'disabled':''}>① 生成密钥</button>
                    <button class="btn btn-primary" onclick="doRegister()" ${!state.userKey?'disabled':''}>② 注册</button>
                    <button class="btn btn-primary" onclick="doIssueAll()" ${!state.reg?'disabled':''}>③ 签发凭证</button>
                    <button class="btn btn-success" onclick="doAggregate()" ${state.partialCreds.length<3?'disabled':''}>④ 聚合凭证</button>
                </div>
                <div class="msg" id="s2Msg"></div>
                ${state.cred ? '<div class="msg show ok">✅ 凭证已就绪！可进行匿名投票</div>' : ''}
                <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
                    ${state.userKey ? '<span class="badge badge-ok">✅ 密钥</span>' : '<span class="badge badge-info">⏳ 密钥</span>'}
                    ${state.reg ? '<span class="badge badge-ok">✅ 注册</span>' : '<span class="badge badge-info">⏳ 注册</span>'}
                    ${state.partialCreds.length>=3 ? '<span class="badge badge-ok">✅ 签发</span>' : '<span class="badge badge-info">⏳ 签发</span>'}
                    ${state.cred ? '<span class="badge badge-ok">✅ 聚合</span>' : '<span class="badge badge-info">⏳ 聚合</span>'}
                </div>
            </div>
            <div class="card" style="margin-top:0">
                <h2>📋 步骤指引</h2>
                <p style="font-size:13px">按顺序点击按钮：① 生成密钥 → ② 注册 → ③ 签发凭证 → ④ 聚合凭证</p>
            </div>
        `;
    }

    async function doKeyGen() {
        const msg = $('s2Msg'); hide(msg);
        const r = await api('POST', '/keygen', { userId: state.userId, credentialId: state.userEmail });
        if (r.success) { state.userKey = { upk: r.upk }; show(msg, '密钥生成成功（邮箱: ' + state.userEmail + '）', 'ok'); renderStep(); }
        else show(msg, '失败: ' + (r.message||''), 'err');
    }

    async function doRegister() {
        const msg = $('s2Msg'); hide(msg);
        const attrs = [($('a1')?.value||'voter'), ($('a2')?.value||'adult'), ($('a3')?.value||'verified')];
        const r = await api('POST', '/register', { userId: state.userId, credentialId: state.userEmail, attributes: attrs });
        if (r.success) { state.reg = r; show(msg, '注册成功（身份: ' + state.userEmail + '）', 'ok'); renderStep(); }
        else show(msg, '失败: ' + (r.message||''), 'err');
    }

    async function doIssueAll() {
        const msg = $('s2Msg'); hide(msg);
        const r = await api('POST', '/issue', { userId: state.userId, credentialId: state.userEmail, issuerIndices: [1,2,3] });
        if (r.success) { state.partialCreds = Array(r.issuedCount).fill({}); show(msg, `收到 ${r.issuedCount} 份签名`, 'ok'); renderStep(); }
        else show(msg, '失败: ' + (r.message||''), 'err');
    }

    async function doAggregate() {
        const msg = $('s2Msg'); hide(msg);
        const r = await api('POST', '/aggregate', { userId: state.userId });
        if (r.success) { state.cred = { aggregated: true }; show(msg, '凭证聚合成功！', 'ok'); renderStep(); setTimeout(() => goToStep(3), 1000); }
        else show(msg, '失败: ' + (r.message||''), 'err');
    }

    // ─── Step 3: Select Vote ───
    function step3(c) {
        c.innerHTML = `
            <div class="card">
                <h2>🗳️ 选择投票</h2>
                <p>从下方列表选择已有投票，或输入合约地址加入投票</p>
                <div class="tabs" id="voteTabs">
                    <div class="tab active" onclick="switchVoteTab('join')">加入投票</div>
                    <div class="tab" onclick="switchVoteTab('create')">创建投票</div>
                </div>
                <div class="tab-content active" id="joinTab">
                    <div id="activeVotesList" style="margin-bottom:16px"></div>
                    <div class="row"><label>合约地址</label><input id="joinAddr" placeholder="0x..."></div>
                    <button class="btn btn-primary" onclick="loadVote()">📋 加载投票</button>
                    <div class="msg" id="s3Msg"></div>
                    <div id="voteInfo" style="display:none;margin-top:12px">
                        <div class="data-box" id="voteInfoBox"></div>
                        <div class="row" style="margin-top:12px">
                            <label>选择选项</label>
                            <select id="voteOption" style="flex:1"></select>
                        </div>
                    </div>
                </div>
                <div class="tab-content" id="createTab">
                    <p style="color:var(--text2)">创建新的投票项目（使用 MetaMask/Ganache 部署合约）</p>
                    <div class="row"><label>标题</label><input id="newTitle" placeholder="投票标题"></div>
                    <div class="row"><label>选项数</label><select id="optCount" onchange="updateOpts()"><option>2</option><option>3</option><option>4</option><option selected>5</option></select></div>
                    <div id="optsContainer"></div>
                    <div class="row"><label>截止</label><input type="datetime-local" id="newDeadline"></div>
                    <button class="btn btn-primary" onclick="createVote()">🚀 创建投票</button>
                </div>
            </div>
        `;
        updateOpts();
        setDeadline();
        loadActiveVotes();
    }

    async function loadActiveVotes() {
        const container = $('activeVotesList');
        try {
            const r = await fetch('/api/votes/active');
            const d = await r.json();
            if (!d.success || !d.votes || d.votes.length === 0) {
                container.innerHTML = '<p style="color:var(--text3);font-size:13px;padding:8px 0">暂无活跃投票</p>';
                return;
            }
            const now = Date.now();
            let html = '<div style="margin-bottom:6px;font-size:12px;color:var(--text2);font-weight:500">📋 活跃投票列表</div>';
            d.votes.forEach(v => {
                const deadline = new Date(v.deadline).getTime();
                const expired = now >= deadline;
                html += `
                    <div onclick="selectActiveVote('${v.contract_address}')" style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rx);margin-bottom:6px;cursor:pointer;transition:.3s;hover:{border-color:var(--a1)}" onmouseenter="this.style.borderColor='var(--a1)'" onmouseleave="this.style.borderColor=''">
                        <div style="flex:1;min-width:0">
                            <div style="font-size:13px;font-weight:600;color:var(--text)">${v.vote_title}</div>
                            <div style="font-size:11px;color:var(--text3);word-break:break-all">${v.contract_address}</div>
                        </div>
                        <div style="text-align:right;flex-shrink:0;margin-left:8px">
                            <span class="badge ${expired ? 'badge-err' : 'badge-ok'}">${expired ? '已截止' : '投票中'}</span>
                            <div style="font-size:10px;color:var(--text3);margin-top:2px">${v.deadline ? new Date(v.deadline).toLocaleDateString() : ''}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        } catch(e) {
            container.innerHTML = '<p style="color:var(--text3);font-size:13px">加载失败</p>';
        }
    }

    function selectActiveVote(addr) {
        $('joinAddr').value = addr;
        loadVote();
    }

    function switchVoteTab(t) {
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab')[t === 'join' ? 0 : 1].classList.add('active');
        document.getElementById(t + 'Tab').classList.add('active');
    }

    function setDeadline() {
        const d = new Date(); d.setDate(d.getDate() + 7);
        const el = $('newDeadline');
        if (el) el.value = d.toISOString().slice(0, 16);
    }

    function updateOpts() {
        const c = $('optCount'); if (!c) return;
        const n = parseInt(c.value); const container = $('optsContainer'); container.innerHTML = '';
        for (let i = 0; i < n; i++) {
            const row = document.createElement('div'); row.className = 'row';
            row.innerHTML = `<label>选项${i+1}</label><input class="opt-inp" placeholder="选项 ${i+1}">`;
            container.appendChild(row);
        }
    }

    async function loadVote() {
        const msg = $('s3Msg'); hide(msg); $('voteInfo').style.display = 'none';
        const addr = $('joinAddr').value.trim();
        if (!addr) { show(msg, '请输入合约地址', 'err'); return; }

        try {
            const r = await fetch(`/getBallotInfo?contractAddress=${addr}`);
            const data = await r.json();
            if (data.title) {
                state.voteInfo = { ...data, address: addr };
                const box = $('voteInfoBox');
                box.innerHTML = `
                    <div class="dr"><span class="dk">标题</span><span class="dv">${data.title}</span></div>
                    <div class="dr"><span class="dk">截止</span><span class="dv">${data.deadline || 'N/A'}</span></div>
                    <div class="dr"><span class="dk">地址</span><span class="dv" style="font-size:11px">${addr.substring(0, 30)}...</span></div>
                `;
                const sel = $('voteOption'); sel.innerHTML = '';
                data.options.forEach(o => { const opt = document.createElement('option'); opt.value = o; opt.textContent = o; sel.appendChild(opt); });
                $('voteInfo').style.display = 'block';
                show(msg, '投票加载成功', 'ok');
            } else { show(msg, '未找到投票', 'err'); }
        } catch(e) { show(msg, '加载失败: ' + e.message, 'err'); }
    }

    async function createVote() {
        const msg = $('s3Msg'); hide(msg);
        const title = $('newTitle')?.value; if (!title) { show(msg, '请输入标题', 'err'); return; }
        const opts = Array.from(document.querySelectorAll('.opt-inp')).map(i => i.value).filter(v => v);
        if (opts.length < 2) { show(msg, '至少2个选项', 'err'); return; }
        const deadline = new Date($('newDeadline')?.value).getTime();
        if (!deadline) { show(msg, '请选择截止日期', 'err'); return; }

        try {
            const r = await fetch('/createVote', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ voteTitle: title, numOptions: opts.length, ...Object.fromEntries(opts.map((o,i)=>['option'+(i+1),o])), deadline, creatorAddress: state.selectedAccount || '' })
            });
            const data = await r.json();
            if (data.success) {
                state.voteInfo = { title, options: opts, address: data.contractAddress, deadline };
                $('joinAddr').value = data.contractAddress;
                show(msg, `投票创建成功！地址: ${data.contractAddress.substring(0,20)}...`, 'ok');
                switchVoteTab('join');
                setTimeout(() => loadVote(), 500);
            } else { show(msg, '创建失败', 'err'); }
        } catch(e) { show(msg, '创建失败: ' + e.message, 'err'); }
    }

    // ─── Step 4: Generate Anonymous Token ───
    function step4(c) {
        c.innerHTML = `
            <div class="card">
                <h2>🎭 生成匿名投票令牌</h2>
                <p>使用凭证系统 Show 算法生成匿名令牌。验证者只能验证令牌有效性，无法识别投票者身份</p>
                ${state.voteInfo ? `
                <div class="data-box" style="margin-bottom:12px">
                    <div class="dr"><span class="dk">投票</span><span class="dv">${state.voteInfo.title}</span></div>
                    <div class="dr"><span class="dk">合约</span><span class="dv" style="font-size:11px">${(state.voteInfo.address || '').substring(0, 30)}...</span></div>
                </div>` : '<p style="color:var(--warn)">⚠️ 请先选择投票</p>'}
                <div class="row"><label>披露属性</label>
                    <label style="font-size:13px;color:var(--text2);cursor:pointer"><input type="checkbox" id="d1" checked> 属性1</label>
                    <label style="font-size:13px;color:var(--text2);cursor:pointer"><input type="checkbox" id="d2"> 属性2</label>
                    <label style="font-size:13px;color:var(--text2);cursor:pointer"><input type="checkbox" id="d3"> 属性3</label>
                </div>
                <button class="btn btn-primary btn-lg" onclick="genToken()" ${!state.cred?'disabled':''}>🎭 生成令牌</button>
                <div class="msg" id="s4Msg"></div>
                ${state.tok ? `
                <div class="data-box">
                    <div class="dr"><span class="dk">σ'₁</span><span class="dv" style="font-size:10px">${state.tok.sigma1.substring(0,30)}...</span></div>
                    <div class="dr"><span class="dk">σ'₂</span><span class="dv" style="font-size:10px">${state.tok.sigma2.substring(0,30)}...</span></div>
                    <div class="dr"><span class="dk">tokHash</span><span class="dv" style="font-size:10px">${String(state.tokHash).substring(0,30)}...</span></div>
                </div>
                <div class="msg show ok">✅ 匿名令牌已生成！可安全提交投票</div>
                ` : ''}
            </div>
        `;
    }

    async function genToken() {
        const msg = $('s4Msg'); hide(msg);
        const indices = [];
        if ($('d1')?.checked) indices.push(1);
        if ($('d2')?.checked) indices.push(2);
        if ($('d3')?.checked) indices.push(3);
        if (indices.length === 0) { show(msg, '至少披露一个属性', 'err'); return; }

        const r = await api('POST', '/show', { userId: state.userId, credentialId: state.userEmail, discloseIndices: indices });
        if (r.success) {
            state.tok = r.token;
            state.tokHash = r.tokHash;
            show(msg, '令牌生成成功！', 'ok');
            renderStep();
        } else { show(msg, '失败: ' + (r.message||''), 'err'); }
    }

    // ─── Step 5: Submit Vote ───
    function step5(c) {
        const canVote = state.tok && state.voteInfo;
        c.innerHTML = `
            <div class="card">
                <h2>✅ 提交匿名投票</h2>
                <p>令牌将通过中继账户提交到区块链，验证者无法追踪您的身份</p>
                ${state.voteInfo ? `
                <div class="data-box">
                    <div class="dr"><span class="dk">投票</span><span class="dv">${state.voteInfo.title}</span></div>
                    <div class="dr"><span class="dk">选项</span><span class="dv" id="selectedOptDisplay">${state.voteInfo.options?.[0] || ''}</span></div>
                    <div class="dr"><span class="dk">令牌状态</span><span class="dv" style="color:${state.tok ? 'var(--ok)' : 'var(--warn)'}">${state.tok ? '✅ 已生成' : '⏳ 未生成'}</span></div>
                </div>` : '<p style="color:var(--warn)">请先选择投票</p>'}
                <div class="row" style="margin-top:12px">
                    <label>选择选项</label>
                    <select id="finalOption">${(state.voteInfo?.options || []).map(o => `<option>${o}</option>`).join('')}</select>
                </div>
                <button class="btn btn-success btn-lg" onclick="submitAnonVote()" ${!canVote?'disabled':''}>🗳️ 提交匿名投票</button>
                <div class="msg" id="s5Msg"></div>
                <div id="voteResult"></div>
            </div>
        `;
    }

    async function submitAnonVote() {
        const msg = $('s5Msg'); hide(msg);
        const resultDiv = $('voteResult'); resultDiv.innerHTML = '';
        const option = $('finalOption')?.value || state.voteInfo?.options?.[0];
        if (!option || !state.tok || !state.voteInfo) { show(msg, '请先完成前置步骤', 'err'); return; }

        show(msg, '⏳ 正在验证令牌并提交投票...', 'info');

        try {
            const r = await fetch('/voteAnon', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contractAddress: state.voteInfo.address,
                    selectedOption: option,
                    tokHash: state.tokHash,
                    tokData: state.tok,
                })
            });
            const data = await r.json();
            if (data.success) {
                resultDiv.innerHTML = `
                    <div class="result-box ok">
                        <div class="icon">✅</div>
                        <div class="title" style="color:var(--ok)">匿名投票成功！</div>
                        <p style="color:var(--text2);margin-top:8px;font-size:14px">
                            您已成功匿名投票「${option}」<br>
                            验证者无法知道您的身份（匿名性由 Theorem 1 保证）<br>
                            令牌哈希: ${String(state.tokHash).substring(0, 30)}...<br>
                            ${state.userEmail ? `📧 投票记录已绑定邮箱: <strong>${state.userEmail}</strong>` : ''}
                        </p>
                    </div>`;
                show(msg, '投票成功！', 'ok');
            } else {
                resultDiv.innerHTML = `
                    <div class="result-box err">
                        <div class="icon">❌</div>
                        <div class="title" style="color:var(--err)">投票失败</div>
                        <p style="color:var(--text2);margin-top:8px">${data.message || data.error || '未知错误'}</p>
                    </div>`;
                show(msg, '投票失败: ' + (data.message || data.error || ''), 'err');
            }
        } catch(e) {
            resultDiv.innerHTML = `<div class="result-box err"><div class="icon">❌</div><div class="title" style="color:var(--err)">错误</div><p style="color:var(--text2)">${e.message}</p></div>`;
            show(msg, '错误: ' + e.message, 'err');
        }
    }

    // Init
    async function initPage() {
        // 检查登录状态
        try {
            const authRes = await fetch('/api/auth/me');
            const authData = await authRes.json();
            if (authData.loggedIn) {
                state.userId = authData.user.userId;
                state.userEmail = authData.user.email || '';
                state.userName = authData.user.username || '';
                // 显示用户绑定信息
                const banner = $('userBanner');
                if (banner) {
                    banner.style.display = 'flex';
                    const dn = $('userDisplayName');
                    const de = $('userDisplayEmail');
                    if (dn) dn.textContent = '👋 ' + state.userName;
                    if (de) de.textContent = state.userEmail || '未设置';
                }
            } else {
                // 未登录，重定向到登录页
                window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                return;
            }
        } catch(e) {
            console.error('Auth check failed:', e);
        }
        // 检查凭证系统是否已初始化
        try {
            const statusRes = await fetch('/api/credential/status');
            const statusData = await statusRes.json();
            if (statusData.initialized) {
                state.initialized = true;
            }
        } catch(e) {
            console.error('Status check failed:', e);
        }
        renderStep();
    }
    initPage();
    // 每 3 秒轮询凭证状态，确保页面动态同步
    setInterval(async () => {
        try {
            const r = await fetch('/api/credential/status');
            const d = await r.json();
            if (d.initialized && !state.initialized) {
                state.initialized = true;
                renderStep();
            }
        } catch(e) {}
    }, 3000);
</script>
</body>
</html>
